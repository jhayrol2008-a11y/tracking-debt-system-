<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bayad Track - Admin Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="login-logo">
        <div style="font-size: 3rem; margin-bottom: 0.5rem;">💳</div>
        <h1>Bayad Track</h1>
        <p>Credit & Debt Management System</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="Enter your password" required>
            <button type="button" class="toggle-password" id="togglePassword">👁️</button>
          </div>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <button type="submit" class="login-button">Login</button>
      </form>

      <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border-gray); text-align: center; color: var(--text-light); font-size: 0.85rem;">
        <p><strong>Demo Credentials:</strong></p>
        <p>Username: <code>admin</code></p>
        <p>Password: <code>admin123</code></p>
      </div>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
